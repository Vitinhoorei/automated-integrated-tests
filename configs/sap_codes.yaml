      descrição: "Planos de manutenção preventiva, preditiva ou rotas"
      valores_validos:
        - { codigo: "16", nome: "Preditiva" }
        - { codigo: "17", nome: "Lubrificação" }
        - { codigo: "18", nome: "Rotina" }
        - { codigo: "19", nome: "Revisão" }
