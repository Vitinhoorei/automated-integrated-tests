REGRAS_DE_CONTEXTO:
  TIPO_ORDEM_X_ATIVIDADE:

    ZCOR: # Se a ordem for Corretiva
      descrição: "Manutenções corretivas programadas ou imediatas"
      valores_validos:
        - { codigo: "28", nome: "Corretiva Programada" }
        - { codigo: "29", nome: "Corretiva Imediata" }
        - { codigo: "32", nome: "Corretiva Pagamento a terceiro" }
        - { codigo: "34", nome: "Manutenção Autônoma" }

    ZMEL: # Se a ordem for Melhoria
      descrição: "Investimentos e melhorias de processo ou segurança"
      valores_validos:
        - { codigo: "30", nome: "Melhoria de Processo" }
        - { codigo: "31", nome: "Melhoria de Manutenção" }
